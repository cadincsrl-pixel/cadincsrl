################################################################################
# Render IaC — Solo el cron job de GPS por ahora.
#
# El web service principal (Hono) está creado manualmente desde el dashboard,
# por eso NO lo replicamos acá (evitamos conflicto con el servicio existente).
# Si en el futuro queremos consolidar, agregamos un `- type: web` con la
# config actual.
#
# Para que esto funcione hay que setear en el Render dashboard:
# 1) BACKEND_URL en este cron     → URL pública del web service
#    (ej: https://cadincsrl.onrender.com — sin barra final)
# 2) CRON_SECRET en este cron     → debe ser EL MISMO valor que en el web service
# 3) CRON_SECRET en el web service (Environment tab del web service existente)
#
# Generar el secret con:  openssl rand -hex 32
################################################################################

services:
  - type: cron
    name: gps-sync-mobilequest
    runtime: image
    image:
      url: docker.io/curlimages/curl:latest
    # Cada 15 minutos. ~96 ejecuciones/día. Costo extra: $0
    # (Mobile Quest gratis, Render incluido en plan, Google Maps no se
    # llama desde el cron sino desde las pantallas).
    # Render usa cron syntax estándar 5 campos: minuto hora dom mes dow
    schedule: "*/15 * * * *"
    # `--fail-with-body` (-f) hace exit code != 0 si el server devuelve >=400,
    # así Render marca el run como failed y queda en el log.
    # Dispara dos endpoints en serie: primero camiones (logística), luego
    # flota interna. Si el primero falla, el segundo igual corre — el `; :`
    # neutraliza el exit code del primero para que curl del segundo defina
    # el estado final del run (lo que más nos importa ver en Render logs).
    startCommand: |
      sh -c '
        curl --fail-with-body --retry 2 --max-time 120 -X POST \
          -H "Authorization: Bearer $CRON_SECRET" \
          "$BACKEND_URL/api/internal/sync-gps" || true
        curl --fail-with-body --retry 2 --max-time 120 -X POST \
          -H "Authorization: Bearer $CRON_SECRET" \
          "$BACKEND_URL/api/internal/sync-gps-flota"
      '
    envVars:
      - key: BACKEND_URL
        sync: false
      - key: CRON_SECRET
        sync: false
